<h2>Available Courses</h2>

<input
  type="text"
  placeholder="Search Course"
  [(ngModel)]="searchTerm"
/>

<div *ngIf="filteredCourses().length === 0">
  No courses found
</div>

<div class="course-container">

  <app-course-card
    *ngFor="let course of filteredCourses()"
    [name]="course.name"
    [code]="course.code"
    [credits]="course.credits"
    [grade]="course.grade">
  </app-course-card>

</div>
